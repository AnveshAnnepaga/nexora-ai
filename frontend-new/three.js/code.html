<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width,initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
    }
  </style>
</head>
<body>
<!-- STITCH_THREEJS_START:ANIMATION_3 class="fixed inset-0 w-full h-full bg-transparent" -->
<div class="fixed inset-0 w-full h-full bg-transparent" style="display:block;">
<script src="https://ajax.googleapis.com/ajax/libs/threejs/r125/three.min.js"></script>
<div id="threejs-container-ANIMATION_3" style="width:100%;height:100%"></div>
<script>
(function() {
  const container = document.getElementById('threejs-container-ANIMATION_3');
  const devicePixelRatio = window.devicePixelRatio || 1;
  const width = container.clientWidth || window.innerWidth;
const height = container.clientHeight || window.innerHeight;

const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(75, width / height, 0.1, 1000);
camera.position.z = 5;

const renderer = new THREE.WebGLRenderer({ alpha: true, antialias: true });
renderer.setSize(width, height);
renderer.setPixelRatio(window.devicePixelRatio);
container.appendChild(renderer.domElement);

// NEXORA Orb
const geometry = new THREE.IcosahedronGeometry(2, 2);
const material = new THREE.MeshPhongMaterial({
    color: 0x00d4ff,
    wireframe: true,
    transparent: true,
    opacity: 0.8,
    emissive: 0x00d4ff,
    emissiveIntensity: 0.5
});
const orb = new THREE.Mesh(geometry, material);
scene.add(orb);

// Internal core
const coreGeom = new THREE.SphereGeometry(0.8, 32, 32);
const coreMat = new THREE.MeshBasicMaterial({ color: 0x7b2fff });
const core = new THREE.Mesh(coreGeom, coreMat);
scene.add(core);

// Lights
const pLight = new THREE.PointLight(0x00d4ff, 2, 10);
pLight.position.set(2, 2, 2);
scene.add(pLight);

const aLight = new THREE.AmbientLight(0x404040);
scene.add(aLight);

function animate() {
    requestAnimationFrame(animate);
    orb.rotation.y += 0.005;
    orb.rotation.x += 0.002;
    
    const time = Date.now() * 0.001;
    orb.scale.setScalar(1 + Math.sin(time) * 0.05);
    core.scale.setScalar(1 + Math.cos(time * 2) * 0.1);
    
    renderer.render(scene, camera);
}

window.addEventListener('resize', () => {
    const w = container.clientWidth || window.innerWidth;
    const h = container.clientHeight || window.innerHeight;
    camera.aspect = w / h;
    camera.updateProjectionMatrix();
    renderer.setSize(w, h);
});

animate();
})();
</script>
</div>
<!-- STITCH_THREEJS_END:ANIMATION_3 -->
</body>
</html>
